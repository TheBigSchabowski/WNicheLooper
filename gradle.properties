# Gradle 9 needs a JDK it can run on as the daemon JVM (JDK 17-21 recommended;
# very new JDKs may be unsupported). If your default `java` is too new for
# Gradle, point it at a compatible JDK here or via JAVA_HOME, e.g. (uncomment
# and adjust the path):
#org.gradle.java.home=C\:/Program Files/Eclipse Adoptium/jdk-21

# The JDK 21 used to compile/package the app is provisioned automatically via
# the Gradle JVM toolchain + Foojay resolver (see settings.gradle.kts), so you
# do NOT need JDK 21 installed just to build.

org.gradle.jvmargs=-Xmx2g
kotlin.daemon.jvmargs=-Xmx2g
